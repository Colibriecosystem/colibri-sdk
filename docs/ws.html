<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Colibri Local API — WebSocket Reference</title>
<link rel="icon" type="image/png" href="./favicon.png" />
<!--
  Colibri Local API WebSocket reference — rendered by the AsyncAPI React component
  (https://github.com/asyncapi/asyncapi-react, Apache-2.0; the same engine behind
  @asyncapi/html-template) from ./asyncapi.yaml. OpenAPI cannot model WebSockets,
  so the /stream protocol lives in its own AsyncAPI document.
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@asyncapi/react-component@3/styles/default.min.css" />
<style>
  html, body { margin: 0; }
  .topbar {
    display: flex; align-items: center; gap: 18px; height: 44px; padding: 0 16px;
    background: #0f1420; color: #e6e9f0; font: 500 14px/1 -apple-system, "Segoe UI", Roboto, sans-serif;
    border-bottom: 1px solid #232a3b;
    position: sticky; top: 0; z-index: 10000;
  }
  .topbar img { width: 22px; height: 22px; }
  .topbar .brand { font-weight: 700; letter-spacing: .2px; margin-right: 8px; }
  .topbar a { color: #9fb0d0; text-decoration: none; padding: 4px 2px; }
  .topbar a:hover { color: #fff; }
  .topbar a.active { color: #fff; border-bottom: 2px solid #4f7cff; }
  .topbar .right { margin-left: auto; }
  #asyncapi { max-width: 1400px; margin: 0 auto; }
  .loading { padding: 40px; font: 15px -apple-system, "Segoe UI", Roboto, sans-serif; color: #555; }
</style>
</head>
<body>
<nav class="topbar">
  <img src="./favicon.png" alt="" /><span class="brand">Colibri Local API</span>
  <a href="./index.html">REST</a>
  <a class="active" href="./ws.html">WebSocket</a>
  <a class="right" href="https://github.com/Colibriecosystem/colibri-sdk">SDKs on GitHub</a>
</nav>
<div id="asyncapi"><div class="loading">Loading the WebSocket reference…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@asyncapi/react-component@3/browser/standalone/index.js"></script>
<script>
  // Reuse the port saved on the REST page (topbar Port field, localStorage) so
  // the displayed ws:// server URL matches the user's actual terminal port.
  (async () => {
    const DEFAULT_PORT = "18845";
    const saved = (localStorage.getItem("colibri.port") || "").trim();
    const port = /^\d{2,5}$/.test(saved) ? saved : DEFAULT_PORT;
    const yaml = await (await fetch("./asyncapi.yaml")).text();
    AsyncApiStandalone.render(
      {
        schema: yaml.replaceAll("ws://127.0.0.1:" + DEFAULT_PORT, "ws://127.0.0.1:" + port),
        config: { show: { sidebar: true, errors: true } },
      },
      document.getElementById("asyncapi"),
    );
  })();
</script>
<script src="./copy-enhancer.js"></script>
</body>
</html>
